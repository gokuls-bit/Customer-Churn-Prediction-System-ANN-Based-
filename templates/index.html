<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered bank customer churn prediction using Artificial Neural Networks.">
    <title>ChurnSense AI — Customer Churn Prediction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-badge">
            <span class="dot"></span>
            ANN Model Active
        </div>
        <h1>ChurnSense AI</h1>
        <h2>Bank Customer Churn Prediction System</h2>
        <div class="accuracy-strip">
            <span>Model Accuracy</span>
            <span class="sep">·</span>
            <span class="value">{{ accuracy }}%</span>
            <span class="sep">·</span>
            <span>ANN · TensorFlow</span>
        </div>
    </div>

    <!-- Form Card -->
    <div class="card">

        {% if error %}
        <div class="error-alert">⚠ {{ error }}</div>
        {% endif %}

        <div class="section-title">Customer Profile Input</div>

        <form action="/predict" method="POST">
            <div class="form-grid">

                <div class="form-group">
                    <label for="credit_score">Credit Score</label>
                    <input type="number" id="credit_score" name="credit_score"
                           min="300" max="850" value="600" required>
                </div>

                <div class="form-group">
                    <label for="geography">Geography</label>
                    <select id="geography" name="geography" required>
                        <option value="France">France</option>
                        <option value="Germany">Germany</option>
                        <option value="Spain">Spain</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age"
                           min="18" max="100" value="40" required>
                </div>

                <div class="form-group">
                    <label for="tenure">Tenure (Years)</label>
                    <input type="number" id="tenure" name="tenure"
                           min="0" max="10" value="3" required>
                </div>

                <div class="form-group">
                    <label for="balance">Account Balance ($)</label>
                    <input type="number" id="balance" name="balance"
                           min="0" step="0.01" value="60000" required>
                </div>

                <div class="form-group">
                    <label for="num_products">Number of Products</label>
                    <select id="num_products" name="num_products" required>
                        <option value="1">1</option>
                        <option value="2" selected>2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="has_cr_card">Has Credit Card?</label>
                    <select id="has_cr_card" name="has_cr_card" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="is_active">Active Member?</label>
                    <select id="is_active" name="is_active" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="estimated_salary">Estimated Salary ($)</label>
                    <input type="number" id="estimated_salary" name="estimated_salary"
                           min="0" step="0.01" value="50000" required>
                </div>

            </div>

            <button type="submit" class="btn-predict">
                ▶ &nbsp; Run Churn Prediction
            </button>
        </form>
    </div>

    <div class="footer">
        Developed by <span>Gokul Kumar Sant</span> &nbsp;·&nbsp; MM(DU) &nbsp;·&nbsp; Roll: 11232629 &nbsp;·&nbsp; 6-G
    </div>

</body>
</html>
